<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sala 3D - PC & Celular</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; user-select: none; }
        #canvas-container { width: 100vw; height: 100vh; }
        
        /* Instruções na tela */
        #instrucoes {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
            font-size: 14px;
        }

        /* Zona onde o Joystick vai aparecer (canto inferior esquerdo) */
        #joystick-zone {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 120px;
            height: 120px;
            z-index: 10;
        }

        /* Botão de Interação (canto inferior direito) */
        #btn-interagir {
            position: absolute;
            bottom: 50px;
            right: 40px;
            width: 70px;
            height: 70px;
            background: rgba(255, 87, 51, 0.8);
            color: white;
            border: 2px solid white;
            border-radius: 50%;
            font-weight: bold;
            font-size: 14px;
            display: none; /* Só aparece no celular */
            justify-content: center;
            align-items: center;
            z-index: 10;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        #btn-interagir:active { background: rgba(255, 87, 51, 1); transform: scale(0.95); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>
</head>
<body>

    <div id="instrucoes">
        <h4 style="margin:0 0 5px 0;">Controles:</h4>
        <div id="texto-controles">Detectando dispositivo...</div>
    </div>

    <div id="joystick-zone"></div>
    <div id="btn-interagir">USAR</div>
    <div id="canvas-container"></div>

    <script>
        // 1. CONFIGURAÇÃO BÁSICA
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 5); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Luzes
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 75);
        scene.add(dirLight);

        // 2. CENÁRIO (Sala)
        const floorGeo = new THREE.PlaneGeometry(20, 20);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const wallMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50 });
        const wallGeo = new THREE.PlaneGeometry(20, 10);

        const backWall = new THREE.Mesh(wallGeo, wallMat); backWall.position.set(0, 5, -10); scene.add(backWall);
        const leftWall = new THREE.Mesh(wallGeo, wallMat); leftWall.position.set(-10, 5, 0); leftWall.rotation.y = Math.PI/2; scene.add(leftWall);
        const rightWall = new THREE.Mesh(wallGeo, wallMat); rightWall.position.set(10, 5, 0); rightWall.rotation.y = -Math.PI/2; scene.add(rightWall);

        // Objeto Interativo (Cubo Vermelho)
        const boxGeo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
        const boxMat = new THREE.MeshStandardMaterial({ color: 0xff5733 });
        const box = new THREE.Mesh(boxGeo, boxMat);
        box.position.set(0, 0.75, 0);
        scene.add(box);

        // Dica visual acima do cubo
        const localInteracao = new THREE.Vector3(0, 0.75, 0);

        // 3. DETECÇÃO DE DISPOSITIVO E CONTROLES
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        // Variáveis de movimento
        let moveData = { x: 0, y: 0 }; // Dados do joystick ou teclado
        let moveSpeed = 0.08;
        const keys = {};

        // Configuração dependendo do dispositivo
        if (isMobile) {
            document.getElementById('texto-controles').innerHTML = "Esquerda: Andar<br>Direita: Arrastar p/ olhar<br>Botão: Interagir";
            document.getElementById('btn-interagir').style.display = 'flex';

            // Criar o Joystick Virtual
            const manager = nipplejs.create({
                zone: document.getElementById('joystick-zone'),
                mode: 'static',
                position: { left: '60px', bottom: '60px' },
                color: 'white'
            });

            manager.on('move', (evt, data) => {
                // Converte a inclinação do joystick em direções X e Y (-1 a 1)
                if (data.direction) {
                    moveData.x = Math.cos(data.angle.radian) * (data.distance / 50);
                    moveData.y = Math.sin(data.angle.radian) * (data.distance / 50);
                }
            });

            manager.on('end', () => {
                moveData = { x: 0, y: 0 }; // Para de andar ao soltar
            });

            // Olhar ao redor no celular (Touch horizontal)
            let touchStartX = 0;
            window.addEventListener('touchstart', (e) => {
                // Ignora toques no joystick ou no botão de interagir
                if(e.touches[0].clientX < window.innerWidth / 2 && e.touches[0].clientY > window.innerHeight / 2) return;
                touchStartX = e.touches[0].clientX;
            });

            window.addEventListener('touchmove', (e) => {
                if(e.touches[0].clientX < window.innerWidth / 2 && e.touches[0].clientY > window.innerHeight / 2) return;
                let touchX = e.touches[0].clientX;
                let deltaX = touchX - touchStartX;
                camera.rotation.y -= deltaX * 0.005; // Sensibilidade do toque
                touchStartX = touchX;
            });

            // Clique no botão Interagir do celular
            document.getElementById('btn-interagir').addEventListener('click', interagir);

        } else {
            // Se for PC
            document.getElementById('texto-controles').innerHTML = "W, A, S, D: Andar<br>Q, E ou Mouse: Olhar<br>F ou Barra de Espaço: Interagir";
            
            window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; if(e.key.toLowerCase() === 'f' || e.key === ' ') interagir(); });
            window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

            // Rotação simples com o mouse ao clicar e arrastar na tela
            let mouseApertado = false;
            window.addEventListener('mousedown', () => mouseApertado = true);
            window.addEventListener('mouseup', () => mouseApertado = false);
            window.addEventListener('mousemove', (e) => {
                if (mouseApertado) {
                    camera.rotation.y -= e.movementX * 0.003;
                }
            });
        }

        // 4. FUNÇÃO DE INTERAÇÃO
        function interagir() {
            // Verifica a distância entre a câmera (jogador) e o cubo
            const distancia = camera.position.distanceTo(box.position);
            
            // Se estiver a menos de 3 metros, a interação funciona!
            if (distancia < 3.5) {
                // Gera uma cor aleatória para o cubo
                const novaCor = Math.random() * 0xffffff;
                box.material.color.setHex(novaCor);
                
                // Pequeno efeito de pulo no cubo para dar feedback
                box.position.y = 1.2;
                setTimeout(() => box.position.y = 0.75, 150);
            }
        }

        // 5. CÁLCULO DE MOVIMENTAÇÃO POR QUADRO
        function atualizarMovimento() {
            const direction = new THREE.Vector3();
            camera.getWorldDirection(direction);
            direction.y = 0;
            direction.normalize();

            const right = new THREE.Vector3();
            right.crossVectors(camera.up, direction).normalize();

            if (isMobile) {
                // Movimentação via Joystick
                camera.position.addScaledVector(direction, moveData.y * moveSpeed);
                camera.position.addScaledVector(right, -moveData.x * moveSpeed);
            } else {
                // Movimentação via Teclado PC
                if (keys['w'] || keys['arrowup']) camera.position.addScaledVector(direction, moveSpeed);
                if (keys['s'] || keys['arrowdown']) camera.position.addScaledVector(direction, -moveSpeed);
                if (keys['a'] || keys['arrowleft']) camera.position.addScaledVector(right, moveSpeed);
                if (keys['d'] || keys['arrowright']) camera.position.addScaledVector(right, -moveSpeed);
                
                // Girar no teclado (opcional, além do mouse)
                if (keys['q']) camera.rotation.y += 0.03;
                if (keys['e']) camera.rotation.y -= 0.03;
            }

            // Limites das paredes (Colisão)
            camera.position.x = Math.max(-9.5, Math.min(9.5, camera.position.x));
            camera.position.z = Math.max(-9.5, Math.min(9.5, camera.position.z));
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 6. LOOP PRINCIPAL
        function animate() {
            requestAnimationFrame(animate);
            
            box.rotation.y += 0.005; // Cubo girando devagar

            atualizarMovimento();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
